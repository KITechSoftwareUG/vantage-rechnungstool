# Public Webhook-Endpoints: keine JWT-Validierung. Authentifizierung laeuft
# ueber endpoint-spezifische Shared-Secrets (n8n-webhook: Query-Param user_id
# + service-role-interne Trust; zahnfunnel-form-webhook: X-Api-Key gegen
# FORM_API_KEY aus app_config).
[functions.n8n-webhook]
verify_jwt = false

[functions.zahnfunnel-form-webhook]
verify_jwt = false

[functions.zahnfunnel-whatsapp-webhook]
verify_jwt = false

# verify_jwt = true ist eigentlich der Default — wir setzen ihn fuer die drei
# folgenden Functions explizit, weil Lovables Deploy-Pipeline ausgelassene
# Bloecke nicht ehrt und die Functions sonst unauthentifiziert erreichbar sind.
[functions.zahnfunnel-whatsapp-send]
verify_jwt = true

[functions.zahnfunnel-suggest-reply]
verify_jwt = true

[functions.zahnfunnel-health-check]
verify_jwt = true
